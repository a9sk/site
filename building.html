<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0c;
      --surface:   #111115;
      --border:    #1e1e26;
      --accent:    #a8b87a;
      --accent2:   #b07a5a;
      --muted:     #a1a1b3;
      --text:      #8a8a96;
      --mono:      'DM Mono', monospace;
      --display:   'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .035;
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: .5;
      pointer-events: none;
      z-index: 0;
    }

    .scene {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .corner {
      position: fixed;
      font-size: .65rem;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .corner-tl { top: 1.5rem; left: 1.5rem; }
    .corner-tr { top: 1.5rem; right: 1.5rem; text-align: right; }
    .corner-bl { bottom: 1.5rem; left: 1.5rem; }
    .corner-br { bottom: 1.5rem; right: 1.5rem; text-align: right; }

    .scaffolding {
      width: 260px;
      height: 200px;
      position: relative;
      margin-bottom: 2.5rem;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }

    .scaffolding svg {
      width: 100%; height: 100%;
      overflow: visible;
    }

    .blink {
      animation: blink 1.2s step-start infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    .headline {
      font-family: var(--display);
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 800;
      line-height: .95;
      letter-spacing: -.03em;
      text-transform: uppercase;
      text-align: center;
      color: #fff;
      animation: fadeUp .8s .1s both;
    }

    .headline em {
      font-style: normal;
      color: var(--accent);
      display: inline-block;
      position: relative;
    }

    .headline em::after {
      content: '';
      position: absolute;
      bottom: 2px; left: 0;
      height: 3px;
      width: 100%;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      animation: sweep 1s .9s forwards;
    }
    @keyframes sweep { to { transform: scaleX(1); } }

    .sub {
      margin-top: 1.6rem;
      font-size: .8rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeUp .8s .3s both;
    }

    .corner-br a {
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: color .2s;
    }
    .corner-br a:hover { color: var(--text); }
    .corner-br svg { width: 16px; height: 16px; fill: currentColor; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .rule {
      width: min(420px, 80vw);
      height: 1px;
      background: var(--border);
      margin-top: 2.2rem;
      animation: fadeUp .8s .9s both;
    }
  </style>
</head>
